site_name: LabClaw
site_url: https://docs.labclaw.org
site_description: Self-evolving agentic system for research laboratories
repo_url: https://github.com/labclaw/labclaw
repo_name: labclaw/labclaw
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - content.action.edit
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            show_root_heading: true
            members_order: source
            docstring_style: google
            merge_init_into_class: true
            show_signature_annotations: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - tables
  - toc:
      permalink: true
  - attr_list
  - md_in_html

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/labclaw/labclaw

nav:
  - Home: index.md
  - Getting Started:
      - Quickstart: quickstart.md
      - Configuration: configuration.md
      - Deployment: deployment.md
  - User Guide:
      - Cookbook: cookbook.md
      - Plugin Development: plugin-development.md
      - Agent System: agents.md
  - Architecture:
      - Overview: architecture.md
      - Memory System: memory-system.md
      - Self-Evolution: self-evolution.md
      - Roadmap: roadmap.md
  - Specifications:
      - Foundations: specs/cross-foundations.md
      - Event System: specs/cross-events.md
      - Graph Nodes: specs/cross-graph-nodes.md
      - "L1: Hardware": specs/L1-hardware.md
      - "L2: Gateway": specs/L2-gateway.md
      - "L3: Discovery": specs/L3-discovery.md
      - "L3: Engine": specs/L3-engine.md
      - "L3: Optimization": specs/L3-optimization.md
      - "L3: Validation": specs/L3-validation.md
      - "L4: Memory": specs/L4-memory.md
      - "L5: Evolution": specs/L5-evolution.md
      - "L5: Persona": specs/L5-persona.md
  - API Reference:
      - REST API: api-reference.md
      - Python API: reference/python-api.md
