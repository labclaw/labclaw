# LabClaw default configuration

system:
  name: labclaw
  version: 0.0.2
  log_level: INFO

graph:
  backend: sqlite
  path: data/labclaw.db

events:
  backend: memory  # memory | redis
  redis_url: redis://localhost:6379

api:
  host: 127.0.0.1
  port: 8000

edge:
  watch_paths: []
  poll_interval_seconds: 5

llm:
  provider: anthropic
  model: claude-sonnet-4-6
  api_key_env: ANTHROPIC_API_KEY
  temperature: 0.7
  max_tokens: 2048
  fallback_provider: local

proactive:
  enabled: true
  commitment_check_interval: 60
  default_cooldown: 5.0

scheduling:
  task_db_path: data/tasks.db
  poll_interval: 1.0
  backoff_base: 2.0
  max_backoff: 60.0

litellm:
  model: gpt-4o
  fallback_models:
    - claude-sonnet-4-6
    - gpt-4o-mini
  timeout: 30
  num_retries: 2

agents:
  default_model: claude-sonnet-4-6
  max_tool_calls: 20
